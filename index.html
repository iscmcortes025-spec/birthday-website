<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>¡Feliz Cumpleaños Mividaaaaa! ❤️🦖</title>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <style>
      /* 🎨 Estilo General y Fondo Atardecer */
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(
          135deg,
          #ff9a9e 0%,
          #fecfef 50%,
          #f7bb97 100%
        );
        background-attachment: fixed;
        color: white;
        text-align: center;
        overflow-x: hidden;
        /* 🦖 Cursor de Dinosaurio */
        cursor:
          url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" style="font-size: 24px;"><text y="20">🦖</text></svg>'),
          auto;
      }

      section {
        padding: 60px 20px;
        min-height: 20vh;
      }

      h1 {
        font-size: 2.5rem;
        text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
        margin-bottom: 10px;
      }

      /* ✨ Botones */
      .btn-principal {
        background: #ff758c;
        color: white;
        border: none;
        padding: 18px 35px;
        font-size: 20px;
        border-radius: 50px;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(255, 117, 140, 0.4);
        transition: all 0.3s ease;
        font-weight: bold;
      }

      .btn-principal:hover {
        background: #ff5e78;
        transform: scale(1.1) rotate(-2deg);
      }

      .btn-razon {
        background: #fdbb2d;
        color: #5d4037;
        border: none;
        padding: 12px 25px;
        font-size: 16px;
        border-radius: 15px;
        cursor: pointer;
        font-weight: bold;
        margin-top: 20px;
        display: none;
        transition: 0.3s;
      }

      .btn-razon:hover {
        background: #ffcc33;
        transform: translateY(-3px);
      }

      /* 💌 La Carta */
      .card {
        background: rgba(255, 255, 255, 0.92);
        color: #d63384;
        margin: 20px auto;
        padding: 35px;
        border-radius: 30px;
        max-width: 500px;
        font-size: 1.1rem;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        display: none;
        border: 2px solid #fff;
      }

      /* 🦕 Elementos Flotantes */
      .floating-element {
        position: fixed;
        bottom: -50px;
        user-select: none;
        animation: float 6s linear infinite;
        z-index: -1;
        opacity: 0.8;
      }

      @keyframes float {
        0% {
          transform: translateY(0) rotate(0deg);
          opacity: 1;
        }
        100% {
          transform: translateY(-110vh) rotate(360deg);
          opacity: 0;
        }
      }

      /* ✍️ Máquina de escribir */
      #texto {
        border-right: 3px solid #ff758c;
        display: inline-block;
        padding-right: 5px;
        white-space: pre-line;
        line-height: 1.6;
        min-height: 1.2em;
        text-align: left; /* Alineado a la izquierda para que parezca carta */
      }

      .razon-texto {
        margin-top: 15px;
        font-style: italic;
        font-weight: bold;
        color: #ff758c;
      }
    </style>
  </head>
  <body>
    <section>
      <h1>🎂 ¡Feliz Cumpleaños Mividaaaaa! ❤️</h1>
      <p style="font-size: 1.2rem; opacity: 0.9">
        ¡Mira el reloj! Ya es tu día... ✨
      </p>
      <button class="btn-principal" onclick="abrirRegalo()">
        Abrir regalo 🎁
      </button>
    </section>

    <section id="contenedor-regalo">
      <div class="card" id="regalo">
        <h2 style="color: #ff758c; margin-top: 0">
          Para ti, mi noviecito lindo 🐱🦕💖
        </h2>
        <p id="texto"></p>

        <hr style="border: 0; border-top: 1px solid #ffcfdf; margin: 20px 0" />

        <button class="btn-razon" id="btnRazon" onclick="nuevaRazon()">
          Haz clic para una razón extra ✨
        </button>
        <p id="fraseRazon" class="razon-texto"></p>
      </div>
    </section>

    <script>
      // --- 💌 TEXTO DE LA CARTA (OPCIÓN 2) ---
      const cartaTexto = `Hola mi amooor; oficialmente es tu día! 🎂💕

Quería que este fuera el primer detalle de muchos, porque alguien tan increíble y especial como tú merece una celebración de toda la vida!

Eres la luz que ilumina la vida de quienes tenemos la dicha de conocerte, y hoy celebramos el regalo de tu hermosa existencia 💗

Este es solo el inicio de un día tan maravilloso, de tu día, mi personita especial 💖
No dejes de sonreír nunca 💞

FELIZ CUMPLEAÑOOOOOS MI NIÑO PRECIOSOOOOO, MUAAAAAK 

¡Rawr significa "te amo" en cumpleañero! 🦖💖`;

      // --- ✨ FUNCIÓN PRINCIPAL AL ABRIR ---
      function abrirRegalo() {
        document.getElementById("regalo").style.display = "block";
        document.getElementById("btnRazon").style.display = "inline-block";

        // 🎊 Lanzar Confeti al inicio
        confetti({
          particleCount: 150,
          spread: 70,
          origin: { y: 0.6 },
          colors: ["#ff9a9e", "#f7bb97", "#ff758c", "#ffffff"],
        });

        // ✍️ Iniciar Efecto Escritura
        if (i === 0) escribirCarta();

        // Ocultar botón principal
        event.target.style.display = "none";
      }

      // --- ✍️ EFECTO ESCRITURA ---
      let i = 0;
      function escribirCarta() {
        const velocidad = 45; // Un poquito más rápido para que no sea tan larga la espera
        const contenedor = document.getElementById("texto");
        if (i < cartaTexto.length) {
          contenedor.innerHTML += cartaTexto.charAt(i);
          i++;
          setTimeout(escribirCarta, velocidad);
        }
      }

      // --- ❤️ BOTÓN DE RAZONES EXTRA ---
      const razones = [
        "Porque eres mi constante 💞",
        "Porque la vida es más bonita contigo 🦕",
        "Por tus abrazos de dinosaurio 🦖",
        "Porque tu risa es curativa 💓",
        "Por como brillan tus ojitos avellana cuando sonríes. ✨",
        "Porque eres la persona más increíble que conozco. 💘",
        "¡Simplemente porque eres tú! 💖",
      ];

      function nuevaRazon() {
        const p = document.getElementById("fraseRazon");
        const razonAleatoria =
          razones[Math.floor(Math.random() * razones.length)];
        p.innerText = razonAleatoria;

        // Confeti extra al hacer clic
        confetti({
          particleCount: 40,
          spread: 60,
          origin: { y: 0.8 },
          colors: ["#fdbb2d", "#ff758c"],
        });
      }

      // --- 🦕 ELEMENTOS FLOTANTES ---
      const emojis = ["❤️", "💖", "✨", "💘", "💕", "🦖", "🦕", "🐱"];

      setInterval(() => {
        const el = document.createElement("div");
        el.className = "floating-element";
        el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
        el.style.left = Math.random() * 100 + "vw";
        el.style.fontSize = Math.random() * 20 + 15 + "px";
        el.style.animationDuration = Math.random() * 3 + 4 + "s";

        document.body.appendChild(el);
        setTimeout(() => el.remove(), 6000);
      }, 450);
    </script>
  </body>
</html>
